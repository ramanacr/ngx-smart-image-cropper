name: Publish Package

on:
  release:
    types: [published] # Triggers when you create a GitHub Release

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # CRITICAL: Required to request the OIDC token from npm
      contents: read  # Required to check out the repository code
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build --if-present

      - name: Publish to npm
        run: npm publish --provenance
